project:
  id: business-plan-builder-v7
  name: Business Plan Builder v7
  type: app
  profile: app/ai-agent
  default_actor: gyoza
  agents:
    - id: gyoza
      role: intake_and_build
      owns:
        - agent-prompts/**
        - personas/**
        - frameworks/**
        - output-templates/**
        - references/**
      escalates_when:
        - lane_split_required
        - architecture_change
    - id: kodak
      role: design_and_review
      owns:
        - docs/**
        - .agent-os/**
      escalates_when:
        - implementation_blocked
        - routing_contract_needs_change
    - id: botchan
      role: observe_and_collect
      owns:
        - knowledge-base/**
      forbidden:
        - final_copy
  sources_of_truth:
    - CLAUDE.md
    - business-plan-builder-SPEC.md
    - business-plan-builder-v7.skill
  required_reads:
    core-intake:
      - CLAUDE.md
      - business-plan-builder-SPEC.md
    codex-plan:
      - CLAUDE.md
      - business-plan-builder-SPEC.md
      - MCP_SETUP.md
  quality_gates:
    intake:
      required: true
      checks:
        - request_has_scope
        - phase_identified
    qa:
      required: true
      checks:
        - agent_prompts_template_valid
        - phase_flow_integrity
        - mcp_connection_check
    ship-check:
      required: true
      checks:
        - changed_files_match_scope
        - no_hardcoded_secrets
        - readme_updated_if_needed
    pre-commit:
      required: true
      checks:
        - secrets_scan
        - binary_or_large_file_guard
        - manifest_integrity
  memory_map:
    current-state:
      path: project-memory/current-state.md
      update_mode: session-draft
      draft_path: project-memory/agent-os/session-drafts/current-state.md
    next-actions:
      path: project-memory/next-actions.md
      update_mode: session-draft
      draft_path: project-memory/agent-os/session-drafts/next-actions.md
    decision-log:
      path: project-memory/decision-log.md
      update_mode: session-draft
      draft_path: project-memory/agent-os/session-drafts/decision-log.md
    tool-logs:
      path: project-memory/agent-os/tool-logs/
      update_mode: append-only
    touched-files:
      path: project-memory/agent-os/touched-files/latest.md
      update_mode: replace-latest
  hooks:
    session-end: .agent-os/hooks/session-end/settings.json
    post-tool: .agent-os/hooks/post-tool/settings.json
    pre-commit: .agent-os/hooks/pre-commit/settings.json
  commands:
    intake: .agent-os/commands/intake.md
    qa: .agent-os/commands/qa.md
    ship-check: .agent-os/commands/ship-check.md
    memory-sync: .agent-os/commands/memory-sync.md
  install:
    script: .agent-os/scripts/install-common-os.sh
  constraints:
    - Keep Common OS as an overlay; do not replace existing repo files.
    - Phase flow (0-6E) must be maintained.
    - Agent prompts must use YAML frontmatter templates.
    - MCP server (hojokin) connection must work via settings.json.
    - No hardcoded API keys or credentials.
